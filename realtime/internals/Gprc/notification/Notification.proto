syntax = "proto3";

package Notification;

option go_package = "go-dashboard/internals/Gprc/Notification";

service NotificationService {
    // 1. Changed 'return' to 'returns'
    // 2. Wrapped types in parentheses ()
    rpc Notifiy(NotificationParam) returns (NotificationReturn);
}

message NotificationParam {
    string message = 1;
    // 3. Changed 'int' to 'int32' (or int64)
    // 4. Added missing semicolons
    repeated int32 ids = 2;
}

message NotificationReturn {
    repeated int32 recieved_ids = 1;
    repeated int32 not_recieved_ids = 2;
}
