syntax = "proto3";

package auth;

option go_package = "go-dashboard/internals/Gprc/authpb";

service AuthService {
  rpc IsAuth (AuthRequest) returns (AuthResponse) {}
}

message AuthRequest {
  string token = 1;
}

message AuthResponse {
  bool authenticated = 1;
  uint64 user_id = 2;
  string error = 3;
}
